spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/wallet_notification
    username: postgres
    password: Suma76latha@
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.wallet.notification_service.event.WalletEvent
      enable-auto-commit: false
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:sumalatha002812@gmail.com}
    password: ${MAIL_PASSWORD:ozluxnwdzyfjvylf}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8084

kafka:
  topics:
    wallet-events: wallet-events

